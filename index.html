<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS | Biological Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --deep-blue: #0a192f;
            --glass: rgba(0, 242, 255, 0.05);
            --error-red: #ff4b2b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #102a43 0%, #060e17 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--primary-cyan);
        }

        /* Ambient Background Grid */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
            z-index: 0;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* The Login Terminal */
        .login-card {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(10, 25, 47, 0.85);
            border: 1px solid var(--primary-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2), inset 0 0 20px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(15px);
            clip-path: polygon(0% 15%, 15% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%);
            z-index: 10;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary-cyan);
        }

        /* Animated Avatar Ring */
        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }

        .avatar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed var(--primary-cyan);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        .avatar {
            position: absolute;
            top: 10%; left: 10%;
            width: 80%; height: 80%;
            background: repeating-conic-gradient(from 0deg, var(--primary-cyan) 0deg 20deg, transparent 20deg 40deg);
            border-radius: 50%;
            opacity: 0.6;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Input Styling */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.1);
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--primary-cyan);
            color: var(--deep-blue);
            box-shadow: 0 0 30px var(--primary-cyan);
        }

        /* Status & Hardware Info */
        .system-status {
            margin-top: 20px;
            font-size: 10px;
            display: flex;
            justify-content: space-between;
            opacity: 0.7;
            text-transform: uppercase;
        }

        #error {
            margin-top: 15px;
            height: 20px;
            font-size: 14px;
            color: var(--error-red);
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Scanning Line Effect */
        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.5);
            opacity: 0.2;
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="scanline"></div>
    <div class="title">JARVIS OS</div>

    <div class="avatar-container">
        <div class="avatar-ring"></div>
        <div class="avatar"></div>
    </div>

    <div class="input-group">
        <input type="text" id="username" placeholder="IDENTIFICATION REQUIRED" autocomplete="off">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="ENCRYPTION KEY">
    </div>

    <button onclick="login()">Initiate Boot</button>
    
    <p id="error"></p>

    <div class="system-status">
        <span>Status: Online</span>
        <span>Secure: AES-256</span>
        <span>Node: 7A-X</span>
    </div>
</div>

<script>
    const USER = "admin";
    const PASS = "1234";

    function login() {
        const btn = document.querySelector('button');
        const error = document.getElementById("error");
        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;

        // Visual feedback for clicking
        btn.innerText = "VERIFYING...";
        
        setTimeout(() => {
            if (u === USER && p === PASS) {
                error.style.color = "#00f2ff";
                error.innerText = "ACCESS GRANTED. WELCOME SIR.";
                // Add a small delay before redirect for effect
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 1000);
            } else {
                error.innerText = "CRITICAL ERROR: UNAUTHORIZED ACCESS";
                btn.innerText = "RETRY BOOT";
                // Shake effect
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 200 });
            }
        }, 800);
    }
</script>

</body>
</html>
