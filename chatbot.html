<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | Offline Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-dim: #005663;
            --bg: #02050a;
            --glass: rgba(0, 242, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #102a43 0%, #02050a 100%),
                linear-gradient(var(--glass) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 3vh;
            overflow: hidden;
        }

        /* --- ARC REACTOR --- */
        .core-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .ring {
            position: absolute;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0.3;
        }

        .ring-1 { width: 140px; height: 140px; border-style: dashed; animation: rotate 10s linear infinite; }
        .ring-2 { width: 110px; height: 110px; border-width: 3px; border-top-color: transparent; animation: rotate 4s linear infinite reverse; }
        
        .core {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--accent);
            z-index: 2;
        }

        .active .core { animation: pulse 1s infinite; background: radial-gradient(circle, #fff 0%, var(--accent) 70%); }

        #status {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* --- CHAT HISTORY --- */
        #chat-container {
            width: 90%;
            max-width: 700px;
            height: 50vh;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent-dim);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1rem;
            animation: fadeIn 0.3s ease;
        }

        .user-msg { align-self: flex-end; background: rgba(0, 242, 255, 0.1); border-right: 3px solid var(--accent); color: var(--accent); }
        .jarvis-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border-left: 3px solid #fff; }

        /* --- INPUT --- */
        .input-wrapper {
            position: fixed;
            bottom: 30px;
            width: 85%;
            max-width: 600px;
            display: flex;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--accent-dim);
            border-radius: 50px;
            padding: 10px 25px;
        }

        #user-input { flex: 1; background: transparent; border: none; color: var(--accent); font-family: 'Rajdhani'; font-size: 1.1rem; outline: none; }
        #send-btn { background: transparent; border: none; color: var(--accent); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="core-container" id="mainCore" onclick="initSystem()">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="core"></div>
    </div>

    <div id="status">OFFLINE - CLICK CORE</div>

    <div id="chat-container">
        <div class="message jarvis-msg">Local protocols standing by. Click the core to initialize, Sir.</div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Voice or Type command..." autocomplete="off">
        <button id="send-btn">SEND</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const chatContainer = document.getElementById('chat-container');
        const coreCont = document.getElementById('mainCore');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let isActive = false;
        const WAKE_WORD = "jarvis";

        // --- LOCAL RESPONSE BANK (No API Key needed) ---
        const responses = {
            "hello": "Hello Sir. All systems are operational. How can I assist today?",
            "who are you": "I am J.A.R.V.I.S, your local system assistant.",
            "how are you": "I am functioning within normal parameters, Sir.",
            "time": () => `The current time is ${new Date().toLocaleTimeString()}.`,
            "date": () => `Today is ${new Date().toDateString()}.`,
            "default": "Command processed, Sir."
        };

        // --- SPEECH RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                if (transcript.includes(WAKE_WORD)) {
                    const cmd = transcript.split(WAKE_WORD).pop().trim();
                    if(cmd) handleInput(cmd);
                }
            };
            recognition.onend = () => { if(isActive) recognition.start(); };
        }

        // --- COMMAND PROCESSOR ---
        function handleInput(text) {
            if (!text) return;
            appendMessage('user', text);
            coreCont.classList.add('active');

            const cmd = text.toLowerCase();
            let responseText = "";

            // 1. Check for Website Commands
            if (cmd.includes("open google") || cmd.includes("search for")) {
                const query = cmd.replace("open google", "").replace("search for", "").trim();
                responseText = `Searching Google for ${query || 'you'}, Sir.`;
                window.open(query ? `https://www.google.com/search?q=${query}` : "https://www.google.com", '_blank');
            } 
            else if (cmd.includes("open youtube") || cmd.includes("play")) {
                const query = cmd.replace("open youtube", "").replace("play", "").trim();
                responseText = "Accessing YouTube archives...";
                window.open(query ? `https://www.youtube.com/results?search_query=${query}` : "https://www.youtube.com", '_blank');
            }
            else if (cmd.includes("open github")) {
                responseText = "Opening GitHub, Sir.";
                window.open("https://github.com", '_blank');
            }
            // 2. Check Local Response Bank
            else {
                const foundKey = Object.keys(responses).find(key => cmd.includes(key));
                if (foundKey) {
                    const result = responses[foundKey];
                    responseText = typeof result === 'function' ? result() : result;
                } else {
                    responseText = "Command recognized. Task complete, Sir.";
                }
            }

            // Execute Response
            setTimeout(() => {
                appendMessage('jarvis', responseText);
                speak(responseText);
                coreCont.classList.remove('active');
            }, 500);
        }

        // --- UTILS ---
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'jarvis-msg'}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.9;
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function initSystem() {
            if (isActive) return;
            isActive = true;
            if(recognition) recognition.start();
            statusEl.innerText = "ONLINE / LISTENING";
            const welcome = "Systems initialized. Voice control active, Sir.";
            appendMessage('jarvis', welcome);
            speak(welcome);
        }

        sendBtn.onclick = () => { if(userInput.value.trim()){ handleInput(userInput.value); userInput.value = ""; } };
        userInput.onkeypress = (e) => { if(e.key === "Enter") sendBtn.click(); };
    </script>
</body>
</html>
