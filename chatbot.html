<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-dim: #005663;
            --bg: #02050a;
            --glass: rgba(0, 242, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #102a43 0%, #02050a 100%),
                linear-gradient(var(--glass) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5vh;
            overflow: hidden;
        }

        /* --- ARC REACTOR --- */
        .core-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .ring {
            position: absolute;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0.3;
        }

        .ring-1 { width: 170px; height: 170px; border-style: dashed; animation: rotate 10s linear infinite; }
        .ring-2 { width: 130px; height: 130px; border-width: 3px; border-top-color: transparent; animation: rotate 4s linear infinite reverse; }
        .core {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--accent);
            z-index: 2;
        }

        .active .core { animation: pulse 1s infinite; background: radial-gradient(circle, #fff 0%, var(--accent) 70%); }

        /* --- CONVERSATION LOG --- */
        #chat-container {
            width: 90%;
            max-width: 700px;
            height: 45vh;
            background: var(--glass);
            border: 1px solid var(--accent-dim);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            scrollbar-width: thin;
            scrollbar-color: var(--accent-dim) transparent;
        }

        .message {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(0, 242, 255, 0.1);
            border-right: 3px solid var(--accent);
            color: var(--accent);
            text-align: right;
        }

        .jarvis-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #fff;
            color: #eee;
        }

        /* --- INPUT AREA --- */
        .input-wrapper {
            position: fixed;
            bottom: 30px;
            width: 80%;
            max-width: 600px;
            display: flex;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--accent-dim);
            border-radius: 50px;
            padding: 8px 20px;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            outline: none;
        }

        #send-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="core-container" id="mainCore">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="core"></div>
    </div>

    <div id="status" style="font-family:'Orbitron'; color:var(--accent); margin-bottom:10px; letter-spacing:2px;">SYSTEM OFFLINE</div>

    <div id="chat-container">
        <div class="message jarvis-msg">Neural Link pending. Click the Arc Reactor to begin, Sir.</div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Awaiting command..." autocomplete="off">
        <button id="send-btn">SEND</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const chatContainer = document.getElementById('chat-container');
        const coreCont = document.getElementById('mainCore');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const API_KEY = "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"; // REPLACE THIS

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'jarvis-msg'}`;
            msgDiv.innerText = (role === 'user' ? 'YOU: ' : 'JARVIS: ') + text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.name.includes('Male')) || voices[0];
            utterance.pitch = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        async function getAIResponse(prompt) {
            if (!prompt) return;
            appendMessage('user', prompt);
            coreCont.classList.add('active');
            statusEl.innerText = "PROCESSING...";

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "system", content: "You are JARVIS. Be professional and brief."}, {role: "user", content: prompt}]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                appendMessage('jarvis', reply);
                speak(reply);
            } catch (e) {
                appendMessage('jarvis', "System malfunction. Please check connectivity.");
            } finally {
                coreCont.classList.remove('active');
                statusEl.innerText = "ONLINE / LISTENING";
            }
        }

        // Initialize System
        document.body.addEventListener('click', () => {
            if(statusEl.innerText === "SYSTEM OFFLINE") {
                statusEl.innerText = "ONLINE / LISTENING";
                appendMessage('jarvis', "Systems at 100%. Ready for your command, Sir.");
                speak("Systems at 100%. Ready for your command, Sir.");
            }
        }, { once: true });

        sendBtn.onclick = () => {
            if(userInput.value.trim()) {
                getAIResponse(userInput.value);
                userInput.value = "";
            }
        };

        userInput.onkeypress = (e) => { if(e.key === "Enter") sendBtn.click(); };
    </script>
</body>
</html>
