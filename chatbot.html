<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | Local Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #02050a; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #102a43 0%, #02050a 100%);
            color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .arc-reactor {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--accent); position: relative;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px var(--accent);
        }
        .arc-reactor.active { animation: pulse 1s infinite; background: white; }
        .inner-core { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; filter: blur(2px); }
        #status { font-family: 'Orbitron'; color: var(--accent); margin: 20px; letter-spacing: 2px; font-size: 14px; }
        #log { width: 80%; max-width: 500px; height: 100px; overflow-y: auto; text-align: center; color: #aaa; font-style: italic; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="arc-reactor" id="mic-trigger" onclick="toggleSystem()">
        <div class="inner-core"></div>
    </div>
    
    <div id="status">CLICK TO INITIALIZE JARVIS</div>
    <div id="log">Awaiting command...</div>

    <script>
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        const trigger = document.getElementById('mic-trigger');
        
        let recognition;
        let isListening = false;

        // --- Initialize Speech Engine ---
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                logEl.innerText = `Recognized: "${transcript}"`;
                handleVoiceCommand(transcript);
            };

            recognition.onstart = () => {
                isListening = true;
                statusEl.innerText = "JARVIS IS LISTENING...";
                trigger.classList.add('active');
            };

            recognition.onend = () => {
                if (isListening) recognition.start(); // Auto-restart for continuous "always on" feel
            };
        }

        function toggleSystem() {
            if (!isListening) {
                recognition.start();
                speak("Systems online. How can I help, Sir?");
            } else {
                isListening = false;
                recognition.stop();
                statusEl.innerText = "SYSTEM STANDBY";
                trigger.classList.remove('active');
            }
        }

        // --- Command Logic ---
        function handleVoiceCommand(cmd) {
            // 1. Google Search
            if (cmd.includes("search for") || cmd.includes("google")) {
                let query = cmd.replace("search for", "").replace("google", "").trim();
                speak(`Searching Google for ${query || 'your request'}`);
                window.open(`https://www.google.com/search?q=${query}`, '_blank');
            }
            // 2. Open YouTube
            else if (cmd.includes("open youtube") || cmd.includes("play")) {
                let song = cmd.replace("open youtube", "").replace("play", "").trim();
                speak("Accessing YouTube.");
                window.open(song ? `https://www.youtube.com/results?search_query=${song}` : "https://www.youtube.com", '_blank');
            }
            // 3. Open GitHub
            else if (cmd.includes("open github")) {
                speak("Navigating to GitHub.");
                window.open("https://github.com", '_blank');
            }
            // 4. Basic Talk
            else if (cmd.includes("hello") || cmd.includes("hey jarvis")) {
                speak("Hello Sir. All local systems are functional.");
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0; 
            utter.pitch = 0.9; // Slightly deeper JARVIS tone
            synth.speak(utter);
        }
    </script>
</body>
</html>
