<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-dim: #005663;
            --bg: #02050a;
            --glass: rgba(0, 242, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #102a43 0%, #02050a 100%),
                linear-gradient(var(--glass) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 3vh;
            overflow: hidden;
        }

        /* --- THE ARC REACTOR --- */
        .core-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .ring {
            position: absolute;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0.3;
        }

        .ring-1 { width: 140px; height: 140px; border-style: dashed; animation: rotate 10s linear infinite; }
        .ring-2 { width: 110px; height: 110px; border-width: 3px; border-top-color: transparent; animation: rotate 4s linear infinite reverse; }
        
        .core {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--accent);
            z-index: 2;
            transition: 0.3s;
        }

        .active .core {
            animation: pulse 1s infinite;
            background: radial-gradient(circle, #fff 0%, var(--accent) 70%);
        }

        #status {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* --- CHAT HISTORY --- */
        #chat-container {
            width: 90%;
            max-width: 700px;
            height: 50vh;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--accent-dim);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(10px);
            scrollbar-width: thin;
            scrollbar-color: var(--accent-dim) transparent;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(0, 242, 255, 0.1);
            border-right: 3px solid var(--accent);
            color: var(--accent);
        }

        .jarvis-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #fff;
            color: #e0e0e0;
        }

        /* --- INPUT BAR --- */
        .input-wrapper {
            position: fixed;
            bottom: 30px;
            width: 85%;
            max-width: 600px;
            display: flex;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--accent-dim);
            border-radius: 50px;
            padding: 10px 25px;
            backdrop-filter: blur(5px);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            outline: none;
        }

        #send-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="core-container" id="mainCore" onclick="initSystem()">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="core"></div>
    </div>

    <div id="status">SYSTEM OFFLINE</div>

    <div id="chat-container">
        <div class="message jarvis-msg">Neural Link required. Tap the Arc Reactor to initialize, Sir.</div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Enter command..." autocomplete="off">
        <button id="send-btn">SEND</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const chatContainer = document.getElementById('chat-container');
        const coreCont = document.getElementById('mainCore');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // --- CONFIG ---
        const API_KEY = "YOUR_OPENAI_API_KEY"; // <--- PASTE YOUR KEY HERE
        const WAKE_WORD = "jarvis";
        let isActive = false;

        // --- SPEECH RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                console.log("Heard:", transcript);

                if (transcript.includes(WAKE_WORD)) {
                    const command = transcript.split(WAKE_WORD).pop().trim();
                    if (command) handleInput(command);
                }
            };

            recognition.onend = () => { if(isActive) recognition.start(); };
        }

        // --- LOCAL COMMAND PROCESSOR ---
        function processLocalAction(text) {
            const cmd = text.toLowerCase();

            if (cmd.includes("open google") || cmd.includes("search for")) {
                const query = cmd.replace("open google", "").replace("search for", "").trim();
                const url = query ? `https://www.google.com/search?q=${query}` : "https://www.google.com";
                speak(`Searching Google for ${query || 'you'}, Sir.`);
                appendMessage('jarvis', `Opening Google Search: ${query}`);
                window.open(url, '_blank');
                return true;
            }

            if (cmd.includes("open youtube") || cmd.includes("play")) {
                const query = cmd.replace("open youtube", "").replace("play", "").trim();
                const url = query ? `https://www.youtube.com/results?search_query=${query}` : "https://www.youtube.com";
                speak("Accessing YouTube, Sir.");
                appendMessage('jarvis', `Opening YouTube: ${query}`);
                window.open(url, '_blank');
                return true;
            }

            if (cmd.includes("open github")) {
                speak("Opening GitHub repositories.");
                appendMessage('jarvis', "Navigating to GitHub...");
                window.open("https://github.com", '_blank');
                return true;
            }

            return false;
        }

        // --- AI & SPEECH UTILS ---
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'jarvis-msg'}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.name.includes('Male')) || voices[0];
            utterance.pitch = 0.9;
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        async function getAIResponse(prompt) {
            coreCont.classList.add('active');
            statusEl.innerText = "THINKING...";
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            {role: "system", content: "You are JARVIS. Be extremely brief, helpful, and call the user Sir."},
                            {role: "user", content: prompt}
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                appendMessage('jarvis', reply);
                speak(reply);
            } catch (err) {
                appendMessage('jarvis', "Connection failure. Please check your API key.");
            } finally {
                coreCont.classList.remove('active');
                statusEl.innerText = "ONLINE / LISTENING";
            }
        }

        function handleInput(text) {
            if (!text) return;
            appendMessage('user', text);
            
            const isLocal = processLocalAction(text);
            if (!isLocal) {
                getAIResponse(text);
            }
        }

        // --- INITIALIZATION ---
        function initSystem() {
            if (isActive) return;
            isActive = true;
            
            if (recognition) recognition.start();
            statusEl.innerText = "ONLINE / LISTENING";
            appendMessage('jarvis', "Welcome back, Sir. All systems operational.");
            speak("Welcome back, Sir. All systems operational.");
        }

        sendBtn.onclick = () => {
            if (userInput.value.trim()) {
                handleInput(userInput.value);
                userInput.value = "";
            }
        };

        userInput.onkeypress = (e) => { if (e.key === "Enter") sendBtn.click(); };

    </script>
</body>
</html>
