<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | AI OS Marketplace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --accent-blue: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --card-bg: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-dim: #94a3b8;
            --neon-green: #10b981;
            --neon-amber: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-blue) transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 80px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            color: var(--accent-blue);
            font-size: 24px;
            margin-bottom: 50px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .nav-icon {
            color: var(--text-dim);
            font-size: 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .nav-icon:hover, .nav-icon.active {
            color: var(--accent-blue);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-icon.active::after {
            content: '';
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 20px;
            background: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-glass);
            background: rgba(15, 23, 42, 0.3);
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            padding: 10px 20px;
            border-radius: 30px;
            width: 400px;
            display: flex;
            align-items: center;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            margin-left: 10px;
            width: 100%;
            outline: none;
        }

        .voice-icon {
            color: var(--accent-blue);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- APP GRID --- */
        .content-area {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
        }

        .grid-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
            margin-bottom: 30px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .app-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .app-card:hover::before {
            transform: translateX(100%);
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent-blue);
            float: right;
            border: 1px solid var(--accent-blue);
        }

        .app-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 242, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--accent-blue);
            margin-bottom: 20px;
        }

        .app-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .app-tagline {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .category-tag {
            font-size: 11px;
            color: var(--text-dim);
            border: 1px solid var(--border-glass);
            padding: 3px 8px;
            border-radius: 5px;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(10, 15, 30, 0.95);
            width: 80%;
            max-width: 900px;
            height: 80vh;
            border: 1px solid var(--accent-blue);
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px var(--accent-glow);
            overflow: hidden;
            animation: modalScale 0.3s ease-out;
        }

        .modal-header {
            padding: 30px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .suggestion-box {
            background: rgba(16, 185, 129, 0.05);
            border: 1px dashed var(--neon-green);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .btn-simulate {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-simulate:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 20px var(--accent-blue);
        }

        .btn-approve {
            background: var(--neon-green);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* --- TERMINAL --- */
        #terminal-panel {
            display: none;
            padding: 40px;
            flex-direction: column;
            height: 100%;
        }

        .terminal-window {
            background: #000;
            border: 1px solid var(--border-glass);
            flex: 1;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .term-input-line {
            display: flex;
            margin-top: 20px;
            align-items: center;
        }

        .term-prompt { color: var(--accent-blue); margin-right: 10px; }
        .term-input { 
            background: transparent; border: none; color: var(--accent-blue); 
            flex: 1; outline: none; font-family: inherit;
        }

        /* --- ANIMATIONS --- */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 15px var(--accent-blue); }
            100% { opacity: 0.5; }
        }

        @keyframes modalScale {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-blue);
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo"><i class="fas fa-atom"></i></div>
        <div class="nav-icon active" onclick="switchTab('marketplace')"><i class="fas fa-th-large"></i></div>
        <div class="nav-icon" onclick="switchTab('terminal')"><i class="fas fa-terminal"></i></div>
        <div class="nav-icon"><i class="fas fa-box-open"></i></div>
        <div class="nav-icon" style="margin-top: auto;"><i class="fas fa-cog"></i></div>
    </aside>

    <main>
        <header>
            <div class="search-bar">
                <i class="fas fa-search" style="color: var(--text-dim)"></i>
                <input type="text" placeholder="Command AETHER system...">
                <i class="fas fa-microphone voice-icon"></i>
            </div>
            <div class="profile-section">
                <div style="text-align: right">
                    <div style="font-size: 0.8rem; color: var(--accent-blue)">STARK_ACCESS_GRANTED</div>
                    <div style="font-size: 0.7rem; color: var(--text-dim)">Clearance: Level 9</div>
                </div>
                <img src="https://i.pravatar.cc/150?u=jarvis" alt="Avatar" class="avatar">
            </div>
        </header>

        <div id="marketplace-panel" class="content-area">
            <h2 class="grid-title">Available Neural Modules</h2>
            <div class="app-grid" id="appGrid">
                </div>
        </div>

        <div id="terminal-panel">
            <h2 class="grid-title">AETHER Core Terminal</h2>
            <div class="terminal-window" id="terminalOutput">
                <div style="color: var(--accent-blue)">[SYSTEM READY] - Awaiting instructions...</div>
            </div>
            <div class="term-input-line">
                <span class="term-prompt">user@aether:~$</span>
                <input type="text" class="term-input" id="terminalInput" placeholder="Try 'organize my files'...">
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modalAppName" style="color: var(--accent-blue); letter-spacing: 2px;"></h2>
                    <span id="modalCategory" class="category-tag"></span>
                </div>
                <i class="fas fa-times" style="cursor: pointer;" onclick="closeModal()"></i>
            </div>
            <div class="modal-body">
                <div class="modal-left">
                    <h4 style="margin-bottom: 10px;">PROJECTION</h4>
                    <p id="modalDesc" style="color: var(--text-dim); line-height: 1.6;"></p>
                    
                    <div class="suggestion-box">
                        <h4 style="color: var(--neon-green); margin-bottom: 10px;"><i class="fas fa-robot"></i> AI RECOMMENDATION</h4>
                        <div id="modalSuggestion" style="font-size: 0.9rem; margin-bottom: 15px;"></div>
                        <div style="color: var(--neon-amber); font-size: 0.75rem;">
                            <i class="fas fa-exclamation-triangle"></i> System Hold: Authorization required to execute.
                        </div>
                    </div>
                </div>
                <div class="modal-right" style="background: rgba(0,0,0,0.3); border-radius: 10px; padding: 20px;">
                    <h4>SIMULATION PREVIEW</h4>
                    <div id="modalSimulation" style="font-family: 'Courier New', monospace; font-size: 0.85rem; margin-top: 15px; color: #88f;">
                    </div>
                    
                    <div style="margin-top: 40px; display: flex; align-items: center;">
                        <button class="btn-simulate" onclick="runSimulation()">Run Simulation</button>
                        <button class="btn-approve" onclick="alert('Action authorized. Proceeding with execution...')">Approve & Execute</button>
                        <div class="loader" id="modalLoader" style="margin-left: 15px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apps = [
            {
                id: 1,
                name: "Smart Email Responder",
                tagline: "Context-aware neural drafting.",
                category: "Communication",
                status: "Active",
                icon: "fa-envelope-open-text",
                desc: "Analyzes incoming communication threads to generate high-fidelity response drafts that mimic your professional tone.",
                suggestion: "Suggesting a polite refusal for the project deadline extension based on your current calendar density.",
                sim: "> Analyzing thread ID: 9928\n> Detecting Tone: Urgent\n> Drafting Response...\n\n'Hi Sarah, I reviewed the timeline...'"
            },
            {
                id: 2,
                name: "Auto Code Debugger",
                tagline: "Identify logic flaws in real-time.",
                category: "Dev Tools",
                status: "Experimental",
                icon: "fa-code",
                desc: "Scans your repository for potential memory leaks and logical inconsistencies before they reach production.",
                suggestion: "Detected a potential null pointer in lines 45-50. Suggest adding a conditional guard.",
                sim: "> Checking main.js...\n> Warning: Unhandled Promise Rejection\n> Solution: Add .catch() block to Fetch API."
            },
            {
                id: 3,
                name: "Task Flow Automator",
                tagline: "Natural language to logic gates.",
                category: "Automation",
                status: "Active",
                icon: "fa-project-diagram",
                desc: "Turn messy thoughts into structured Zapier-style workflows just by speaking to the core system.",
                suggestion: "I can link your Typeform submissions directly to your Slack #leads channel. Proceed?",
                sim: "> Mapping Input: User Voice\n> Logic: If Form.Submit THEN Slack.SendMessage\n> Status: Waiting for user 'Yes'"
            },
            {
                id: 4,
                name: "AI File Organizer",
                tagline: "Entropy reduction for your drive.",
                category: "Productivity",
                status: "Suggested",
                icon: "fa-folder-tree",
                desc: "Deep-scans your filesystem to group unrelated assets into logical, project-based hierarchies.",
                suggestion: "Found 45 loose PNGs. Suggest moving to /Projects/Aether/Assets.",
                sim: "> Scanning Root...\n> Found: screenshot_1.png, draft_final_v2.pdf\n> Proposed Move: /Sorted/March_2026/"
            },
            {
                id: 5,
                name: "Meeting Notes Gen",
                tagline: "Voice-to-Action item synthesis.",
                category: "Productivity",
                status: "Active",
                icon: "fa-microphone-lines",
                desc: "Listen to ambient audio during meetings and automatically generate a summary with clear owners and deadlines.",
                suggestion: "Generated 3 action items for Mark and 1 for Janet. Send to their email?",
                sim: "> Audio Stream Active\n> Detected Speaker: Alex\n> Summary: Launch set for Friday. Mark to fix CSS bugs."
            }
        ];

        // Render Cards
        function renderApps() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = apps.map(app => `
                <div class="app-card" onclick="openModal(${app.id})">
                    <span class="status-badge">${app.status}</span>
                    <div class="app-icon"><i class="fas ${app.icon}"></i></div>
                    <div class="app-name">${app.name}</div>
                    <div class="app-tagline">${app.tagline}</div>
                    <span class="category-tag">${app.category}</span>
                </div>
            `).join('');
        }

        // Modal Logic
        function openModal(id) {
            const app = apps.find(a => a.id === id);
            document.getElementById('modalAppName').innerText = app.name;
            document.getElementById('modalCategory').innerText = app.category;
            document.getElementById('modalDesc').innerText = app.desc;
            document.getElementById('modalSuggestion').innerText = app.suggestion;
            document.getElementById('modalSimulation').innerText = "> Initialize module...\n> Waiting for user request...";
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function runSimulation() {
            const loader = document.getElementById('modalLoader');
            const simBox = document.getElementById('modalSimulation');
            const appName = document.getElementById('modalAppName').innerText;
            const app = apps.find(a => a.name === appName);
            
            loader.style.display = 'block';
            simBox.innerText = "> Running neural simulation...";
            
            setTimeout(() => {
                loader.style.display = 'none';
                simBox.innerText = app.sim + "\n\n[SIMULATION COMPLETE] - No changes were made to real data.";
            }, 1500);
        }

        // Tab Switching
        function switchTab(tab) {
            document.getElementById('marketplace-panel').style.display = tab === 'marketplace' ? 'block' : 'none';
            document.getElementById('terminal-panel').style.display = tab === 'terminal' ? 'flex' : 'none';
            
            document.querySelectorAll('.nav-icon').forEach(icon => icon.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Terminal Input
        const termInput = document.getElementById('terminalInput');
        const termOutput = document.getElementById('terminalOutput');

        termInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = termInput.value.toLowerCase();
                const newLine = document.createElement('div');
                newLine.style.color = 'var(--text-dim)';
                newLine.innerHTML = `<span style="color:var(--neon-green)">></span> ${termInput.value}`;
                termOutput.appendChild(newLine);

                const response = document.createElement('div');
                response.style.marginBottom = '10px';
                
                if (cmd.includes('organize')) {
                    response.innerHTML = `<div style="color:var(--accent-blue); padding: 10px; border: 1px solid var(--accent-blue); margin-top:5px;">
                        <strong>AETHER Suggestion:</strong> I've identified 12 redundant files. 
                        <br>Move to Trash? <button style="background:transparent; color:cyan; border:1px solid cyan; font-size:10px; cursor:pointer">Confirm</button></div>`;
                } else {
                    response.innerText = `[AETHER]: Command recognized. No automatic action taken. Please select a module from the marketplace.`;
                }
                
                termOutput.appendChild(response);
                termInput.value = '';
                termOutput.scrollTop = termOutput.scrollHeight;
            }
        });

        // Init
        renderApps();
    </script>
</body>
</html
