<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | System Diagnostics</title>
    <link rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --glass: rgba(0, 242, 255, 0.05);
            --border: rgba(0, 242, 255, 0.3);
            --bg-dark: rgba(2, 5, 10, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

        body {
            height: 100vh;
            background: url('jarvis.png') no-repeat center/cover;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Heavy Professional Blur */
        .blur-overlay {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(20px) brightness(0.4);
            background: radial-gradient(circle, transparent 20%, #000 120%);
            z-index: -1;
        }

        /* --- AI AUTOMATION BUTTON --- */
        .top-ai-button {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .top-ai-button button {
            padding: 6px 20px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s all;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            animation: pulseGlow 2s infinite;
        }

        .top-ai-button button:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.05);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(0,242,255,0.2); }
            50% { box-shadow: 0 0 15px rgba(0,242,255,0.5); }
            100% { box-shadow: 0 0 5px rgba(0,242,255,0.2); }
        }

        /* --- TOP NAV --- */
        .top-nav {
            height: 50px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .status-pill {
            padding: 2px 10px;
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 10px;
            font-family: 'Orbitron';
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
        }

        /* --- MAIN CONTENT SPLIT --- */
        .main-container {
            flex: 1;
            display: flex;
            padding: 40px;
            gap: 40px;
            align-items: center;
        }

        .system-info {
            flex: 1;
            padding: 25px;
            background: var(--glass);
            border-left: 3px solid var(--accent);
            backdrop-filter: blur(5px);
        }

        .info-row {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .info-label { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .info-value { font-size: 22px; font-family: 'Orbitron'; }

        .visuals {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .graph-box {
            height: 120px;
            background: var(--glass);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(transparent, var(--accent));
            opacity: 0.3;
            animation: surge 2s ease-in-out infinite alternate;
        }

        @keyframes surge {
            from { height: 20%; }
            to { height: 60%; }
        }

        .call-to-action {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .space-text {
            font-family: 'Orbitron';
            font-size: 14px;
            letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .dock {
            align-self: center;
            margin-bottom: 30px;
            padding: 12px 25px;
            background: rgba(10, 25, 41, 0.7);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            gap: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .dock-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            transition: 0.3s cubic-bezier(0.47, 0, 0.745, 0.715);
            cursor: pointer;
        }

        .dock-icon:hover {
            transform: translateY(-15px) scale(1.3);
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }
    </style>
</head>
<body>
    <div class="top-ai-button">
        <button onclick="goToApp()">AI AUTOMATION</button>
    </div>

    <div class="blur-overlay"></div>

    <header class="top-nav">
        <div style="font-family: 'Orbitron'; letter-spacing: 2px;">CORE_V7 // DIAGNOSTICS</div>
        <div style="display: flex; gap: 20px;">
            <div class="status-pill">📡 LINK: SECURE</div>
            <div class="status-pill">🔋 POWER: 100%</div>
            <div id="clock" style="font-family: 'Orbitron'; width: 80px;">00:00:00</div>
        </div>
    </header>

    <main class="main-container">
        <section class="system-info">
            <div class="info-row">
                <div class="info-label">Current Node</div>
                <div class="info-value">STARK-ENT-NYC</div>
            </div>
            <div class="info-row">
                <div class="info-label">Memory Allocation</div>
                <div class="info-value">74.2 / 128 GB</div>
            </div>
            <div class="info-row">
                <div class="info-label">Encryption Level</div>
                <div class="info-value">AES-256 BIT</div>
            </div>
            <div class="info-row">
                <div class="info-label">Neural Uplink</div>
                <div class="info-value" style="color: var(--accent);">ACTIVE</div>
            </div>
        </section>

        <div class="call-to-action">
            <div class="space-text">PRESS [ SPACE ] TO INITIALIZE INTERFACE</div>
        </div>

        <section class="visuals">
            <div class="graph-box">
                <div style="padding: 10px; font-size: 10px; color: var(--accent);">CPU LOAD DISTRIBUTION</div>
                <div class="wave"></div>
            </div>
            <div class="graph-box">
                <div style="padding: 10px; font-size: 10px; color: var(--accent);">NETWORK THROUGHPUT</div>
                <div class="wave" style="animation-delay: 0.5s; background: #fff;"></div>
            </div>
            <div class="graph-box">
                <div style="padding: 10px; font-size: 10px; color: var(--accent);">THERMAL SENSORS</div>
                <div class="wave" style="animation-delay: 1s; height: 10%;"></div>
            </div>
        </section>
    </main>

    <footer class="dock">
        <div class="dock-icon" onclick="openSite('google')">📁</div>
        <div class="dock-icon" onclick="openSite('github')">🌐</div>
        <div class="dock-icon" onclick="openSite('youtube')">🛡️</div>
        <div class="dock-icon" style="background: rgba(0, 242, 255, 0.2);" onclick="openSite('openai')">⚙️</div>
    </footer>

    <script>
        // Spacebar Redirect
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.location.href = "aai.html";
            }
        });

        // Clock Function
        setInterval(() => {
            document.getElementById("clock").innerText = new Date().toLocaleTimeString();
        }, 1000);

        // App Redirect
        function goToApp() {
            window.location.href = "app.html";
        }

        // Dock Redirect Logic
        function openSite(platform) {
            const urls = {
                'google': 'https://www.github.com',
                'github': 'https://www.google.com',
                'youtube': 'https://www.avastativirus.com',
                'openai': 'https://www.openai.com'
            };
            window.open(urls[platform], '_blank'); // Opens in new tab
        }
    </script>
</body>
</html>
